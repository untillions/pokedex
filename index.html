<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Pokédex Tracker Hub</title>
    <style>
        :root {
            /* Styles imported from your existing tracker */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border-color: #d0d0d0;
            --selected-bg: #e8f4fd;
            --selected-border: #2196f3;
            --text-main: #333;
            --text-muted: #777;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0px;
            text-align: center;
        }
        
        h2 {
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14pt;
        }

        /* Responsive Grid: 3x2 on desktop, 1 col on mobile */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 1000px;
        }

        @media (min-width: 900px) {
            .hub-grid {
                grid-template-columns: repeat(2, 450px);
                justify-content: center;
            }
            
        }

        @media (max-width: 600px) {
            .hub-grid {
                grid-template-columns: 1fr;
            }
            
            .progress-row {
				gap: 8px; /* Tighter gap on mobile */
			}
			
            .s1 {
				left: 5% !important; 
				bottom: 15%;
			}	
			.s2 {
				left: 17% !important;
				top: 10%;
			}
			.s3 {
				left: 29% !important;
				bottom: 8%;
			}
			
			h1 {
				font-size: 14pt;
			}
        
			h2 {
				font-size: 11pt;
			}
        
            body { padding: 0px 10px; }
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--selected-border);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .game-card {
			background: var(--card-bg);
			border: 1px solid var(--border-color);
			border-radius: 15px;
			width: 100%;
			aspect-ratio: auto;
			min-height: 130px;
			display: flex;
			flex-direction: column; /* Stacks content and footer */
			overflow: hidden;
			position: relative;
			text-decoration: none;
			transition: transform 0.2s, box-shadow 0.2s;
		}
		
		/* Container for logo and pokemon */
		.visual-area {
			position: relative;
			flex-grow: 1; /* Fills the space above the footer */
			display: flex;
			align-items: flex-start; /* Logo stays at top */
			padding: 5px;
			overflow: hidden;
			justify-content: flex-end;
			min-height: 80px;
			flex-grow: 1;
		}
		
		.game-logo {
			width: auto;
			max-height: 100%; /* Limits logo width so it doesn't cover everything */
			height: auto;
			object-fit: contain;
			z-index: 10; /* Keeps logo above/below based on your preference */
			position: relative;
		}
		
		.card-footer {
			padding: 0 25px 5px 15px;
			background: #fafafa;
			border-top: 1px solid #eee;
			flex-shrink: 0;
		}
		
		.progress-row {
			display: flex;
			align-items: center;
			gap: 15px;
		}
		
		.progress-label {
			font-size: 11px;
			font-weight: bold;
			color: var(--text-muted);
			text-transform: uppercase;
			white-space: nowrap;
		}
		
		.progress-container {
			flex-grow: 1;
			height: 8px;
			background: #e0e0e0;
			border-radius: 4px;
			position: relative;
			margin: 8px 0px 18px 0px; /* Space for badges above/below */
		}
		
		.progress-fill {
			height: 100%;
			background: #cc0000;
			border-radius: 4px;
			width: 0%;
			transition: width 0.3s ease;
		}
		
		.multiplier-badge {
			position: absolute;
			top: 12px;
			font-size: 9px;
			font-weight: bold;
			background: #eee;
			padding: 1px 4px;
			border-radius: 4px;
			color: #444;
		}

        .game-logo {
            max-width: 60%;
            max-height: auto;
            object-fit: contain;
        }

		.starter {
			position: absolute;
			width: 12%; 
			height: auto;
			transform: scale(var(--s, 1));
			filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
			z-index: 5;	
			transition: width 0.2s ease;
		}
		
		.s1 { left: 5%; bottom: 15%; }
        .s2 { left: 20%; top: 10%; }
        .s3 { left: 35%; bottom: 8%; }

        .blank-card {
            background: #e0e0e0;
            opacity: 0.6;
            cursor: default;
        }

    </style>
</head>
<body>

    <h1>Pokedex Trackers</h1>
    <h2>Click a game to see more details</h2>

    <div class="hub-grid">
        <a href="lgpe.html" class="game-card">
			<div class="visual-area">
				<img src="logos/lgpe2.png" class="game-logo">
				<img src="starters/pikachu.gif" class="starter s2" style="--s:1.48;">
				<img src="starters/eevee.gif" class="starter s1" style="--s:1.23;">
            </div>
            
            <div class="card-footer">
				<div class="progress-row">
					<div class="progress-label">Caught</div>
					<div class="progress-container">
						<div id="lgpe-bar" class="progress-fill"></div>
						<div id="lgpe-caught" class="multiplier-badge" style="transform: translateX(-50%); color: #cc0000; z-index: 20;">0</div>
						<div id="lgpe-total" class="multiplier-badge" style="right: 0; transform: translateX(50%);">400</div>
					</div>
				</div>
			</div>
        </a>

        <a href="swsh.html" class="game-card">
			<div class="visual-area">
				<img src="logos/swsh2.png" class="game-logo">
                <img src="starters/scorbunny.gif" class="starter s3" style="--s:1.04;">
                <img src="starters/sobble.gif" class="starter s2" style="--s:0.85;">
                <img src="starters/grookey.gif" class="starter s1" style="--s:0.98;">
            </div>

            <div class="card-footer">
				<div class="progress-row">
					<div class="progress-label">Caught</div>
					<div class="progress-container">
						<div id="swsh-bar" class="progress-fill"></div>
						<div id="swsh-caught" class="multiplier-badge" style="transform: translateX(-50%); color: #cc0000; z-index: 20;">0</div>
						<div id="swsh-total" class="multiplier-badge" style="right: 0; transform: translateX(50%);">403</div>
					</div>
				</div>
			</div>
        </a>

        <a href="bdsp.html" class="game-card">
			<div class="visual-area">
				<img src="logos/bdsp2.png" class="game-logo">
                <img src="starters/turtwig.gif" class="starter s1" style="--s:0.87;">
                <img src="starters/chimchar.gif" class="starter s3" style="--s:1.03;">
                <img src="starters/piplup.gif" class="starter s2" style="--s:1.04;">
            </div>

            <div class="card-footer">
				<div class="progress-row">
					<div class="progress-label">Caught</div>
					<div class="progress-container">
						<div id="bdsp-bar" class="progress-fill"></div>
						<div id="bdsp-caught" class="multiplier-badge" style="transform: translateX(-50%); color: #cc0000; z-index: 20;">0</div>
						<div id="bdsp-total" class="multiplier-badge" style="right: 0; transform: translateX(50%);">400</div>
					</div>
				</div>
			</div>
        </a>

        <a href="sv.html" class="game-card">
			<div class="visual-area">
				<img src="logos/sv2.png" class="game-logo">
                <img src="starters/sprigatito.gif" class="starter s2" style="--s:0.73;">
                <img src="starters/fuecoco.gif" class="starter s1" style="--s:0.75;">
                <img src="starters/quaxly.gif" class="starter s3" style="--s:0.83;">
            </div>

            <div class="card-footer">
				<div class="progress-row">
					<div class="progress-label">Caught</div>
					<div class="progress-container">
						<div id="sv-bar" class="progress-fill"></div>
						<div id="sv-caught" class="multiplier-badge" style="transform: translateX(-50%); color: #cc0000; z-index: 20;">0</div>
						<div id="sv-total" class="multiplier-badge" style="right: 0; transform: translateX(50%);">400</div>
					</div>
				</div>
			</div>
        </a>

        <a href="za.html" class="game-card">
			<div class="visual-area">
				<img src="logos/za2.png" class="game-logo">
                <img src="starters/chikorita.gif" class="starter s3" style="--s:0.62;">
                <img src="starters/tepig.gif" class="starter s2" style="--s:0.88;">
                <img src="starters/totodile.gif" class="starter s1" style="--s:1;">
            </div>

            <div class="card-footer">
				<div class="progress-row">
					<div class="progress-label">Caught</div>
					<div class="progress-container">
						<div id="za-bar" class="progress-fill"></div>
						<div id="za-caught" class="multiplier-badge" style="transform: translateX(-50%); color: #cc0000; z-index: 20;">0</div>
						<div id="za-total" class="multiplier-badge" style="right: 0; transform: translateX(50%);">400</div>
					</div>
				</div>
			</div>
        </a>

        <div class="game-card blank-card">
            <div class="logo-section" style="color: var(--text-muted); font-weight: bold;">FUTURE GAME</div>
            <div class="pokemon-section"></div>
        </div>
    </div>

	<script>
		function updateHub() {
			const gameData = [
				{ id: 'lgpe', total: 153 },
				{ id: 'swsh', total: 403 },
				{ id: 'bdsp', total: 493 },
				{ id: 'sv',   total: 400 },
				{ id: 'za',   total: 454 }
			];
	
			gameData.forEach(game => {
				const caught = parseInt(localStorage.getItem(`${game.id}_caught_count`)) || 0;
				const percent = (caught / game.total) * 100;
	
				// Update Label Text
				const caughtLabel = document.getElementById(`${game.id}-caught`);
				if (caughtLabel) {
					caughtLabel.textContent = caught;
					caughtLabel.style.left = `${percent}%`; // Moves badge with the bar
				}
	
				// Update Progress Bar
				const bar = document.getElementById(`${game.id}-bar`);
				if (bar) {
					bar.style.width = `${percent}%`;
				}
			});
		}
	
		// Run on load and on storage changes
		document.addEventListener('DOMContentLoaded', updateHub);
		window.addEventListener('storage', updateHub);
	</script>
</body>
</html>
